<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <linearGradient id="acGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38BDF8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0284C7;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="300" height="300" fill="url(#acGradient)"/>
  <g transform="translate(150, 150)">
    <!-- AC unit body -->
    <rect x="-55" y="-45" width="110" height="90" fill="#E0F2FE" rx="5"/>
    <!-- Main panel -->
    <rect x="-50" y="-40" width="100" height="50" fill="#BAE6FD" stroke="#0284C7" stroke-width="2" rx="3"/>
    <!-- Display -->
    <rect x="-40" y="-30" width="50" height="15" fill="#075985" rx="2"/>
    <!-- Control buttons -->
    <circle cx="-20" cy="10" r="5" fill="#0284C7"/>
    <circle cx="0" cy="10" r="5" fill="#0284C7"/>
    <circle cx="20" cy="10" r="5" fill="#0284C7"/>
    <!-- Vent slats -->
    <line x1="-45" y1="25" x2="45" y2="25" stroke="#0284C7" stroke-width="2"/>
    <line x1="-45" y1="32" x2="45" y2="32" stroke="#0284C7" stroke-width="2"/>
  </g>
  <text x="150" y="280" font-size="18" font-weight="bold" text-anchor="middle" fill="#ffffff">AC UNITS</text>
</svg>
