<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <linearGradient id="tableGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4F46E5;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="300" height="300" fill="url(#tableGradient)"/>
  <g transform="translate(150, 150)">
    <!-- Table top -->
    <rect x="-50" y="-40" width="100" height="50" fill="#E0E7FF" stroke="#4338CA" stroke-width="2" rx="3"/>
    <!-- Left leg -->
    <rect x="-45" y="10" width="8" height="45" fill="#818CF8"/>
    <!-- Right leg -->
    <rect x="37" y="10" width="8" height="45" fill="#818CF8"/>
    <!-- Cross support -->
    <rect x="-40" y="35" width="80" height="4" fill="#6366F1"/>
    <!-- Monitor on table -->
    <rect x="-20" y="-30" width="40" height="25" fill="#C7D2FE" stroke="#4338CA" stroke-width="1" rx="2"/>
    <!-- Screen -->
    <rect x="-15" y="-25" width="30" height="15" fill="#A5B4FC" rx="1"/>
  </g>
  <text x="150" y="280" font-size="16" font-weight="bold" text-anchor="middle" fill="#ffffff">STUDY TABLES</text>
</svg>
