<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <linearGradient id="bedGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="300" height="300" fill="url(#bedGradient)"/>
  <g transform="translate(150, 150)">
    <!-- Bed frame -->
    <rect x="-60" y="-30" width="120" height="80" fill="none" stroke="#ffffff" stroke-width="3" rx="5"/>
    <!-- Pillows -->
    <circle cx="-40" cy="-20" r="15" fill="#E0E7FF" opacity="0.8"/>
    <circle cx="-15" cy="-20" r="15" fill="#E0E7FF" opacity="0.8"/>
    <!-- Mattress -->
    <rect x="-50" y="-15" width="100" height="50" fill="#F3E8FF" opacity="0.7"/>
    <!-- Blanket -->
    <path d="M -50 10 Q -40 20 -20 20 Q 0 20 20 15 Q 40 10 50 0" fill="#DDD6FE" opacity="0.8" stroke="#A78BFA" stroke-width="2"/>
  </g>
  <text x="150" y="280" font-size="18" font-weight="bold" text-anchor="middle" fill="#ffffff">BEDS</text>
</svg>
