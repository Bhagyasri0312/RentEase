<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <linearGradient id="wardrobeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D946EF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A21CAF;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="300" height="300" fill="url(#wardrobeGradient)"/>
  <g transform="translate(150, 150)">
    <!-- Wardrobe body -->
    <rect x="-50" y="-55" width="100" height="110" fill="#F3E8FF" stroke="#A21CAF" stroke-width="2" rx="5"/>
    <!-- Left door -->
    <rect x="-45" y="-50" width="45" height="100" fill="#E9D5FF" stroke="#9333EA" stroke-width="2" rx="3"/>
    <!-- Right door -->
    <rect x="0" y="-50" width="45" height="100" fill="#E9D5FF" stroke="#9333EA" stroke-width="2" rx="3"/>
    <!-- Left handle -->
    <circle cx="-20" cy="0" r="3" fill="#9333EA"/>
    <!-- Right handle -->
    <circle cx="20" cy="0" r="3" fill="#9333EA"/>
    <!-- Shelves indication -->
    <line x1="-40" y1="-20" x2="40" y2="-20" stroke="#D8B4FE" stroke-width="1"/>
    <line x1="-40" y1="0" x2="40" y2="0" stroke="#D8B4FE" stroke-width="1"/>
  </g>
  <text x="150" y="280" font-size="16" font-weight="bold" text-anchor="middle" fill="#ffffff">WARDROBES</text>
</svg>
