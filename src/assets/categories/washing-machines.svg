<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <linearGradient id="washerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="300" height="300" fill="url(#washerGradient)"/>
  <g transform="translate(150, 150)">
    <!-- Washing machine body -->
    <rect x="-50" y="-55" width="100" height="110" fill="#DBEAFE" rx="5"/>
    <!-- Door -->
    <circle cx="0" cy="0" r="35" fill="#BAE6FD" stroke="#0284C7" stroke-width="3"/>
    <!-- Inner drum -->
    <circle cx="0" cy="0" r="30" fill="#E0F2FE" stroke="#0284C7" stroke-width="1"/>
    <!-- Control panel -->
    <rect x="-40" y="-50" width="80" height="15" fill="#60A5FA" rx="2"/>
    <!-- Display -->
    <rect x="-35" y="-45" width="70" height="8" fill="#1E40AF" rx="1" opacity="0.7"/>
  </g>
  <text x="150" y="280" font-size="16" font-weight="bold" text-anchor="middle" fill="#ffffff">WASHING MACHINES</text>
</svg>
