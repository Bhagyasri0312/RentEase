<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <linearGradient id="tvGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A855F7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7E22CE;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="300" height="300" fill="url(#tvGradient)"/>
  <g transform="translate(150, 150)">
    <!-- TV frame -->
    <rect x="-55" y="-50" width="110" height="80" fill="#EDE9FE" stroke="#6B21A8" stroke-width="3" rx="5"/>
    <!-- Screen -->
    <rect x="-48" y="-42" width="96" height="64" fill="#1E1B4B" rx="2"/>
    <!-- Stand -->
    <rect x="-30" y="35" width="60" height="10" fill="#C084FC" rx="2"/>
    <!-- Base -->
    <rect x="-40" y="45" width="80" height="6" fill="#A855F7" rx="1"/>
    <!-- Power light -->
    <circle cx="45" cy="35" r="3" fill="#EF4444"/>
  </g>
  <text x="150" y="280" font-size="18" font-weight="bold" text-anchor="middle" fill="#ffffff">SMART TVs</text>
</svg>
