<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <linearGradient id="sofaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0369A1;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="300" height="300" fill="url(#sofaGradient)"/>
  <g transform="translate(150, 150)">
    <!-- Sofa frame -->
    <rect x="-70" y="-20" width="140" height="70" fill="#F87171" rx="5"/>
    <!-- Sofa seat -->
    <rect x="-65" y="-15" width="130" height="40" fill="#FBBF24" opacity="0.9"/>
    <!-- Back cushions -->
    <rect x="-60" y="-35" width="20" height="20" fill="#FCA5A5" rx="3"/>
    <rect x="-30" y="-35" width="20" height="20" fill="#FCA5A5" rx="3"/>
    <rect x="0" y="-35" width="20" height="20" fill="#FCA5A5" rx="3"/>
    <rect x="30" y="-35" width="20" height="20" fill="#FCA5A5" rx="3"/>
    <!-- Armrests -->
    <rect x="-75" y="-5" width="10" height="35" fill="#DC2626" rx="2"/>
    <rect x="65" y="-5" width="10" height="35" fill="#DC2626" rx="2"/>
  </g>
  <text x="150" y="280" font-size="18" font-weight="bold" text-anchor="middle" fill="#ffffff">SOFAS</text>
</svg>
