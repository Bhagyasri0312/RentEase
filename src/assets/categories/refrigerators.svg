<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <linearGradient id="fridgeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14B8A6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D9488;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="300" height="300" fill="url(#fridgeGradient)"/>
  <g transform="translate(150, 150)">
    <!-- Fridge body -->
    <rect x="-45" y="-60" width="90" height="120" fill="#E0F2FE" rx="5"/>
    <!-- Top door -->
    <rect x="-40" y="-55" width="40" height="55" fill="#BAE6FD" stroke="#0284C7" stroke-width="2" rx="3"/>
    <!-- Bottom door -->
    <rect x="0" y="-55" width="40" height="55" fill="#BAE6FD" stroke="#0284C7" stroke-width="2" rx="3"/>
    <!-- Handle left -->
    <circle cx="-20" cy="0" r="3" fill="#0284C7"/>
    <!-- Handle right -->
    <circle cx="20" cy="0" r="3" fill="#0284C7"/>
    <!-- Ice maker section -->
    <rect x="-40" y="5" width="80" height="50" fill="#7DD3FC" stroke="#0284C7" stroke-width="2" rx="3"/>
    <!-- Text -->
    <text x="0" y="-25" font-size="12" text-anchor="middle" fill="#0284C7" font-weight="bold">SMART</text>
  </g>
  <text x="150" y="280" font-size="18" font-weight="bold" text-anchor="middle" fill="#ffffff">REFRIGERATORS</text>
</svg>
